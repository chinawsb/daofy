# Daofy for Delphi — 客户端规则安装描述符
# 由 client_rules_installer 读取，将 daofy-delphi.md 安装到对应 MCP 客户端的规则目录。
rule:
  id: daofy-delphi
  version: "2026.07.14.3"
  source: "Daofy for Delphi MCP Server"
  file: daofy-delphi.md              # 要安装的规则文件（与本文件同目录）
  managed_filename: daofy-delphi.md  # 安装后在客户端规则目录中的文件名

  # 视为 Delphi 文件、必须用 delphi_file 读写的扩展名
  extensions:
    - .pas
    - .dpr
    - .dpk
    - .dfm
    - .fmx
    - .inc
    - .dproj
    - .groupproj

  # 客户端匹配 → 规则目录（相对用户主目录）
  # match 为 clientInfo.name 的子串（大小写不敏感）。
  #
  # 注意：通义灵码 / Comate / MarsCode 等多为 IDE 插件，经 MCP 连接时
  # clientInfo.name 是宿主 IDE（如 "Visual Studio Code" / "IntelliJ IDEA"），
  # 而非工具名，故无法靠 name 命中。此类场景请用 DAOFY_CLIENT_RULES_DIR
  # 手动指定目录，或依赖 CodeBuddy 用户级 rules。
  # 文心快码 Comate 规则为 JSON 格式（非 markdown 目录机制），不在此列。
  clients:
    - match: ["codebuddy"]
      rules_dir: ".codebuddy/rules"
      format: markdown
    - match: ["cursor"]
      rules_dir: ".cursor/rules"
      format: markdown
      frontmatter:
        alwaysApply: true
        description: "Daofy Delphi 文件读写路由规则"
        globs:
          - "*.pas"
          - "*.dpr"
          - "*.dpk"
          - "*.dfm"
          - "*.fmx"
          - "*.inc"
          - "*.dproj"
          - "*.groupproj"
    - match: ["claude"]
      rules_dir: ".claude/rules"
      format: markdown
    - match: ["trae"]
      rules_dir: ".trae/rules"
      format: markdown
      frontmatter:
        alwaysApply: true
        description: "Daofy Delphi 文件读写路由规则"
        globs:
          - "*.pas"
          - "*.dpr"
          - "*.dpk"
          - "*.dfm"
          - "*.fmx"
          - "*.inc"
          - "*.dproj"
          - "*.groupproj"
    - match: ["lingma", "qoder", "tongyi"]
      rules_dir: ".lingma/rules"
      format: markdown
    - match: ["codearts"]
      # 华为云码道(CodeArts Doer/Snap)明确兼容 AGENTS.md：
      # 个人级规则放 %USERPROFILE%/.codeartsdoer/AGENTS.md 即被自动识别。
      # 普通 .codeartsdoer/rule/ 目录内部格式不透明，故用 AGENTS.md 路径最稳。
      rules_dir: ".codeartsdoer"
      managed_filename: "AGENTS.md"
      format: markdown
